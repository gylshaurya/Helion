<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Helion</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="app-title">Helion 1.0</div>

  <aside id="left-toolbar" class="panel">

    <button id="pauseBtn" class="icon-btn"><img id="pauseIcon" src="../assets/pause.png" alt="pause"/></button>

    <div class="divider"></div>
    
    <div class="time-scale">

      <div class="time-scale-header"><span>Time</span><span id="timeScaleValue">1.0x</span>

    </div>
    <input type="range" id="timeScaleSlider" min="0" max="100" value="50"/>

    <div class="divider"></div>

    <label class="toggle"><span>Trails</span><input type="checkbox" id="toggleTrails" checked /></label>
    <label class="toggle"><span>Velocity</span><input type="checkbox" id="toggleVelocity" checked /></label>
    <label class="toggle"><span>Force</span><input type="checkbox" id="toggleForce" checked /></label>

    <div class="divider"></div>

    <button id="recenterBtn" class="text-btn">Re-center</button>
    
    <div class="divider"></div>
    
    <button id="resetBtn" class="text-btn">Reset</button>

  </aside>

  <aside id="right-toolbar">

    <div id="body-controls" class="panel hidden">
      <h3>Body Controls</h3>

      <div class="divider"></div>

      <label>Mass<input type="range" id="massSlider" min="1" max="10000" /></label>

      <label>Radius<input type="range" id="radiusSlider" min="10" max="200" /></label>

      <div class="divider"></div>
      
      <label>Color<input type="color" id="colorPicker" /></label>
      
    
    </div>

    <div id="body-info" class="panel hidden"></div>

  </aside>

  <button id="addBodyBtn" class="fab">+</button>

  <script type="module" src="../scripts/main.js"></script>
</body>
</html>
