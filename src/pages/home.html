<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Helion</title>
  <link rel="stylesheet" href="../css/home.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:display=swap" rel="stylesheet">
</head>
<body>

  <div class="auth-btns">
    <div id="auth-logged-out">
      <button id="login-btn" class="primary-btn auth-btn">Login</button>
    </div>

    <div id="auth-logged-in" class="auth-user hidden">
      <span id="user-email"></span>
      <button id="logout-btn" class="primary-btn auth-btn logout-btn">Logout</button>
    </div>
  </div>

  <div class="menu-container">
    <h1 class="app-title">Helion</h1>
    <p class="app-subtitle">A Solar System Simulator</p>

    <div class="menu-actions">
      <button data-nav="/simulation" class="primary-btn">New Simulation</button>
      <button data-nav="/load" class="primary-btn">Load Simulation</button>
      <button data-nav="/presets" class="primary-btn">Presets</button>
    </div>
  </div>

  <script type="module" src="../scripts/pages/home.js"></script>
  <script type="module" src="../scripts/navigation.js"></script>
  <script type="module" src="../scripts/auth.js"></script>

</body>
</html>
